<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tech Campus — 任务态势</title>
<style>
:root{
  --bg:#0c1119;--panel-bg:rgba(14,20,32,0.85);
  --dev:#5b9bd5;--hw:#e07b5a;--mgmt:#6bae85;--content:#9b8ec4;--infra:#c47b8b;
  --ew:#5b9bd5;--ns:#e07b5a;--int:#9b8ec4;
  --muted:#8892a4;--text:#d0d7e4;--white:#f0f4fa;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font:15px 'Inter','Segoe UI',system-ui,sans-serif;color:var(--text)}
canvas{display:block}
#tooltip{position:absolute;pointer-events:none;background:rgba(12,17,25,0.96);border:1px solid rgba(255,255,255,0.12);border-radius:5px;padding:8px 12px;font:11px 'JetBrains Mono',monospace;color:var(--white);white-space:nowrap;display:none;z-index:10;box-shadow:0 2px 16px rgba(0,0,0,0.5)}
#hud{position:absolute;top:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;font:11px 'JetBrains Mono',monospace;color:var(--muted);pointer-events:none;z-index:5}
#hud .title{color:var(--white);font-weight:600;letter-spacing:0.06em}
#bottom{position:absolute;bottom:10px;left:10px;right:10px;display:flex;gap:14px;pointer-events:none;z-index:5;align-items:flex-end}
#trafficBox{display:flex;flex-direction:column;gap:5px;min-width:200px;background:var(--panel-bg);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:8px 10px}
.bar-row{display:flex;align-items:center;gap:8px;font:10px 'JetBrains Mono',monospace}
.bar-label{width:28px;text-align:right;color:var(--muted)}
.bar-track{flex:1;height:12px;border-radius:5px;background:rgba(255,255,255,0.04);overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width 0.5s}
.bar-val{width:54px;text-align:right;font-size:9px;color:var(--text)}
#statBox{flex:1;display:flex;gap:14px;flex-wrap:wrap;font:10px 'JetBrains Mono',monospace;color:var(--muted);background:var(--panel-bg);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:8px 12px;align-items:center}
#statBox span{white-space:nowrap}
#statBox .v{color:var(--white);font-weight:600}

/* Category legend top-right */
</style></head>
<body>
<div id="hud"><span class="title">TECH CAMPUS · 任务态势</span><span id="roundLabel">R0</span></div>
<div id="bottom">
  <div id="trafficBox">
    <div class="bar-row"><span class="bar-label">EW</span><div class="bar-track"><div class="bar-fill" id="bEW" style="width:0%;background:var(--ew)"></div></div><span class="bar-val" id="vEW">0 KB</span></div>
    <div class="bar-row"><span class="bar-label">NS</span><div class="bar-track"><div class="bar-fill" id="bNS" style="width:0%;background:var(--ns)"></div></div><span class="bar-val" id="vNS">0 KB</span></div>
    <div class="bar-row"><span class="bar-label">INT</span><div class="bar-track"><div class="bar-fill" id="bINT" style="width:0%;background:var(--int)"></div></div><span class="bar-val" id="vINT">0 KB</span></div>
  </div>
  <div id="statBox">
    <span>提交 <span class="v" id="com">0</span></span>
    <span>模型 <span class="v" id="mod">0</span></span>
    <span>文档 <span class="v" id="doc">0</span></span>
    <span>测试 <span class="v" id="tst">0</span></span>
    <span>API <span class="v" id="api">0</span></span>
    <span>CI <span class="v" id="ci">0/0</span></span>
    <span>通过率 <span class="v" id="pass">0%</span></span>
  </div>
</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>

<script>
const CAT_COLORS = {dev:'#5b9bd5',ai_ic:'#e07b5a',mgmt:'#6bae85',content:'#9b8ec4',infra:'#c47b8b'};
const CAT_ICONS = {dev:'🖥',ai_ic:'🔬',mgmt:'📋',content:'📝',infra:'⚙'};

// Each agent has a task goal and current progress
const AGENTS = {
  // dev: each has a code commit target
  DEV_FE:{name:'前端开发',dept:'消费者BG',cat:'dev',task:'代码提交',goal:3,icon:'🖥'},
  DEV_BE:{name:'后端开发',dept:'云计算与AI',cat:'dev',task:'代码提交',goal:2,icon:'🖥'},
  DEV_FW:{name:'固件开发',dept:'无线通信',cat:'dev',task:'Bug修复',goal:3,icon:'🖥'},
  DEV_AI:{name:'AI训练',dept:'云计算与AI',cat:'ai_ic',task:'模型训练',goal:1,icon:'🔬'},
  DEV_IC:{name:'IC设计',dept:'芯片设计',cat:'ai_ic',task:'EDA仿真',goal:1,icon:'🔬'},
  ARCHITECT:{name:'架构师',dept:'基础平台',cat:'mgmt',task:'设计审查',goal:5,icon:'📋'},
  PM:{name:'产品经理',dept:'消费者BG',cat:'mgmt',task:'需求文档',goal:3,icon:'📋'},
  DOC_WRITER:{name:'文档工程师',dept:'基础平台',cat:'content',task:'文档编写',goal:4,icon:'📝'},
  QA:{name:'QA测试',dept:'智能制造',cat:'content',task:'自动化测试',goal:3,icon:'📝'},
  REPO_ADMIN:{name:'仓库管理',dept:'基础平台',cat:'infra',task:'代码推送',goal:5,icon:'⚙'},
  DEV_OPS:{name:'DevOps',dept:'基础平台',cat:'infra',task:'CI流水线',goal:3,icon:'⚙'},
};

// Per-agent progress
let progress = {};
for(const id of Object.keys(AGENTS)) progress[id] = 0;

// Comms edges (very subtle)
const COMM_EDGES=[
  ['PM','DEV_FE'],['PM','DEV_BE'],['ARCHITECT','DEV_FE'],['ARCHITECT','DEV_BE'],['ARCHITECT','DEV_FW'],
  ['ARCHITECT','DEV_AI'],['ARCHITECT','DEV_IC'],['ARCHITECT','DOC_WRITER'],
  ['DEV_FE','DEV_BE'],['DEV_AI','DEV_BE'],['DEV_OPS','DEV_FE'],['DEV_OPS','DEV_BE'],['DEV_OPS','ARCHITECT'],
  ['QA','DEV_FE'],['QA','DEV_BE'],['QA','DEV_FW'],['QA','DEV_AI'],['QA','DEV_IC'],['QA','ARCHITECT'],
  ['DEV_FE','REPO_ADMIN'],['DEV_BE','REPO_ADMIN'],['DEV_FW','REPO_ADMIN'],['DEV_AI','REPO_ADMIN'],['DEV_IC','REPO_ADMIN'],
  ['QA','REPO_ADMIN'],['DEV_OPS','REPO_ADMIN'],
];

// Layout: 5 groups
const GROUPS = {
  dev:{ids:['DEV_FE','DEV_BE','DEV_FW'],cx:0.18,cy:0.36,spread:65},
  ai_ic:{ids:['DEV_AI','DEV_IC'],cx:0.16,cy:0.64,spread:55},
  mgmt:{ids:['ARCHITECT','PM'],cx:0.40,cy:0.30,spread:70},
  content:{ids:['DOC_WRITER','QA'],cx:0.70,cy:0.34,spread:60},
  infra:{ids:['REPO_ADMIN','DEV_OPS'],cx:0.68,cy:0.64,spread:55},
};

let S={r:0,com:0,mod:0,doc:0,tst:0,fail:0,api:0,ci_ok:0,ci_fail:0,ew_kb:0,ns_kb:0,int_kb:0,events:[]};

function sim(){
  S.r++;
  const pick=(arr)=>arr[Math.floor(Math.random()*arr.length)];
  // Random agent makes progress
  const activeIds=Object.keys(AGENTS);
  for(let i=0;i<3;i++){
    const id=pick(activeIds),ag=AGENTS[id];
    if(progress[id]>=ag.goal) continue; // already done
    if(Math.random()<0.5) continue;
    progress[id]++;
    const pct=Math.round(progress[id]/ag.goal*100);
    S.events.push({r:S.r,t:ag.task,d:ag.name+' '+progress[id]+'/'+ag.goal+' ('+pct+'%)'});
    // Traffic
    if(ag.cat==='dev'||ag.cat==='mgmt'||ag.cat==='content'){S.com++;S.ew_kb+=4;}
    else if(ag.cat==='ai_ic'){if(Math.random()>0.5){S.mod++;S.int_kb+=256000}else{S.api++;S.ns_kb+=500}}
    else if(ag.cat==='infra'){S.ci_ok++;S.int_kb+=278528}
  }
  // Random test
  if(Math.random()>0.5){S.tst++;const p=Math.random()>0.3;if(!p)S.fail++;S.ew_kb+=2;S.events.push({r:S.r,t:p?'PASS':'FAIL',d:'test_'+S.tst});}
  // Reset completed tasks occasionally
  for(const[id,ag]of Object.entries(AGENTS)){if(progress[id]>=ag.goal&&Math.random()<0.15){progress[id]=0;S.events.push({r:S.r,t:'RESET',d:ag.name+' 目标重置'});}}
  if(S.events.length>60)S.events=S.events.slice(-60);
}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const tip=document.getElementById('tooltip');
let nodes=[];

function layout(){
  canvas.width=window.innerWidth*devicePixelRatio;canvas.height=window.innerHeight*devicePixelRatio;
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=window.innerWidth,H=window.innerHeight;
  nodes=[];
  for(const[gid,g]of Object.entries(GROUPS)){
    const cx=g.cx*W,cy=g.cy*H;
    g.ids.forEach((id,i)=>{
      const a=(i/g.ids.length)*Math.PI*2-Math.PI/2,dx=Math.cos(a)*g.spread,dy=Math.sin(a)*g.spread;
      const ag=AGENTS[id];
      nodes.push({id,x:cx+dx,y:cy+dy,cat:ag.cat,color:CAT_COLORS[ag.cat],name:ag.name,dept:ag.dept,task:ag.task,goal:ag.goal,progress:progress[id],icon:ag.icon});
    });
  }
}

function draw(){
  const w=window.innerWidth,h=window.innerHeight;
  ctx.clearRect(0,0,w,h);

  // Background grid
  ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=0.4;
  for(let x=0;x<w;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}

  // Group zones with category labels
  const CAT_LABELS={dev:'🖥 开发',ai_ic:'🔬 AI/芯片',mgmt:'📋 管理',content:'📝 文档/测试',infra:'⚙ 基础设施'};
  for(const[gid,g]of Object.entries(GROUPS)){
    const cx=g.cx*w,cy=g.cy*h,r=g.spread+45;
    ctx.fillStyle=CAT_COLORS[gid];ctx.globalAlpha=0.03;
    ctx.beginPath();ctx.roundRect(cx-r,cy-r,r*2,r*2,14);ctx.fill();
    ctx.strokeStyle=CAT_COLORS[gid];ctx.globalAlpha=0.10;ctx.lineWidth=0.6;
    ctx.beginPath();ctx.roundRect(cx-r,cy-r,r*2,r*2,14);ctx.stroke();ctx.globalAlpha=1;
    ctx.fillStyle=CAT_COLORS[gid];ctx.globalAlpha=0.4;ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText(CAT_LABELS[gid],cx-r+8,cy-r-6);ctx.globalAlpha=1;
  }

  // Comm edges — very faint
  COMM_EDGES.forEach(([s,t])=>{
    const sn=nodes.find(n=>n.id===s),tn=nodes.find(n=>n.id===t);
    if(!sn||!tn)return;
    ctx.beginPath();ctx.moveTo(sn.x,sn.y);ctx.lineTo(tn.x,tn.y);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;ctx.stroke();
  });

  // Biz edges
  [{s:'DEV_AI',t:'LLM'},{s:'DEV_IC',t:'EDA'},{s:'DEV_BE',t:'BUILD'}].forEach(l=>{
    const sn=nodes.find(n=>n.id===l.s);
    if(!sn)return;
    const tx=w*0.92,ty=h*0.4+(l.t==='LLM'?-40:l.t==='EDA'?0:40);
    ctx.beginPath();ctx.moveTo(sn.x,sn.y);ctx.lineTo(tx,ty);
    ctx.strokeStyle='#d4a853';ctx.lineWidth=1.2;ctx.globalAlpha=0.25;ctx.stroke();ctx.globalAlpha=1;
    ctx.setLineDash([5,8]);ctx.lineDashOffset=-Date.now()/200;
    ctx.beginPath();ctx.moveTo(sn.x,sn.y);ctx.lineTo(tx,ty);
    ctx.strokeStyle='#d4a853';ctx.lineWidth=0.6;ctx.globalAlpha=0.4;ctx.stroke();ctx.globalAlpha=1;
    ctx.setLineDash([]);
    ctx.fillStyle='#d4a853';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(l.t,(sn.x+tx)/2,(sn.y+ty)/2-5);
    // Ext dot
    ctx.beginPath();ctx.arc(tx,ty,4,0,Math.PI*2);ctx.fillStyle='#d4a853';ctx.globalAlpha=0.3;ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#d4a853';ctx.font='7px monospace';ctx.fillText(l.t,tx,ty-10);
  });

  // Agent nodes with task progress rings
  nodes.forEach(n=>{
    const pct=n.goal>0?n.progress/n.goal:0;
    const r=22; // node radius
    // Outer glow
    ctx.beginPath();ctx.arc(n.x,n.y,r+4,0,Math.PI*2);ctx.fillStyle=n.color;ctx.globalAlpha=pct*0.08+0.02;ctx.fill();ctx.globalAlpha=1;
    // Progress ring background
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=4;ctx.stroke();
    // Progress ring fill
    if(pct>0){
      ctx.beginPath();ctx.arc(n.x,n.y,r,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);ctx.strokeStyle=n.color;ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();ctx.lineCap='butt';
    }
    // Inner icon
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.icon,n.x,n.y-2);
    // Name below
    ctx.fillStyle='#d0d7e4';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y+r+14);
    // Task fraction
    ctx.fillStyle=n.color;ctx.font='10px monospace';ctx.fillText(n.progress+'/'+n.goal,n.x,n.y+r+25);
    // Task label
    ctx.fillStyle='#8892a4';ctx.font='8px monospace';ctx.fillText(n.task,n.x,n.y+r+36);
  });

  // Event feed top-right
  const ev=S.events.slice(-6);
  ev.forEach((e,i)=>{
    const y=48+i*18,x=w-280;
    const cl=e.t==='PASS'?'#6bae85':e.t==='FAIL'?'#c47b8b':e.t==='RESET'?'#e07b5a':'#8892a4';
    ctx.fillStyle='rgba(12,17,25,0.78)';ctx.fillRect(x,y-11,274,17);
    ctx.fillStyle=cl;ctx.font='10px monospace';ctx.fillText('R'+e.r+' '+e.d,x+5,y);
  });

  // Overall progress bar — centered top
  const totalProgress=Object.values(progress).reduce((a,b)=>a+b,0);
  const totalGoal=Object.values(AGENTS).reduce((a,b)=>a+b.goal,0);
  const overallPct=totalGoal>0?totalProgress/totalGoal:0;
  const barW=360,barH=8,barX=w/2-barW/2,barY=30;
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,4);ctx.fill();
  ctx.fillStyle='#6bae85';ctx.beginPath();ctx.roundRect(barX,barY,barW*overallPct,barH,4);ctx.fill();
  ctx.fillStyle='#8892a4';ctx.font='10px monospace';ctx.textAlign='center';
  ctx.fillText('总体进度 '+Math.round(overallPct*100)+'%  ('+totalProgress+'/'+totalGoal+')',w/2,barY-7);
}

canvas.onmousemove=function(e){
  const mx=e.clientX,my=e.clientY;let found=null;
  for(const n of nodes){const dx=mx-n.x,dy=my-n.y;if(dx*dx+dy*dy<676){found=n;break;}}
  if(found){
    const pct=Math.round(found.progress/found.goal*100);
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-42)+'px';
    tip.innerHTML='<b>'+found.name+'</b> <span style=\"color:#8892a4\">'+found.dept+'</span><br>'+found.task+': '+found.progress+'/'+found.goal+' <span style=\"color:'+found.color+'\">'+pct+'%</span>';
  }else{tip.style.display='none';}
};
canvas.onmouseleave=function(){tip.style.display='none';};

function updateHUD(){
  document.getElementById('roundLabel').textContent='R'+S.r;
  const ew=S.ew_kb,ns=S.ns_kb,it=S.int_kb,mx=Math.max(ew,ns,it,1);
  document.getElementById('bEW').style.width=(ew/mx*100)+'%';document.getElementById('vEW').textContent=ew+' KB';
  document.getElementById('bNS').style.width=(ns/mx*100)+'%';document.getElementById('vNS').textContent=ns+' KB';
  document.getElementById('bINT').style.width=(it/mx*100)+'%';document.getElementById('vINT').textContent=it+' KB';
  document.getElementById('com').textContent=S.com;document.getElementById('mod').textContent=S.mod;
  document.getElementById('doc').textContent=S.doc;document.getElementById('tst').textContent=S.tst;
  document.getElementById('api').textContent=S.api;
  document.getElementById('ci').textContent=S.ci_ok+'/'+(S.ci_ok+S.ci_fail);
  document.getElementById('pass').textContent=(S.tst?Math.round((S.tst-S.fail)/S.tst*100):0)+'%';
}

// ── Data source: API first, local fallback ──
const API_URL = '/api/scenes/tech_campus/state';
let useApi = false;

async function fetchState(){
  try{
    const r=await fetch(API_URL);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    useApi=true;
    // Map API data to local state
    S.r=d.round||0;
    S.ew_kb=(d.traffic?.EAST_WEST?.total_kb)||0;
    S.ns_kb=(d.traffic?.NORTH_SOUTH?.total_kb)||0;
    S.int_kb=(d.traffic?.INTERNAL?.total_kb)||0;
    S.com=d.task_stats?.git_commits||0;
    S.mod=d.task_stats?.model_submissions||0;
    S.doc=d.task_stats?.documents||0;
    S.tst=d.task_stats?.test_reports||0;
    S.api=d.task_stats?.external_api_calls||0;
    S.ci_ok=d.ci_status?.success||0;
    S.ci_fail=d.ci_status?.failed||0;
    S.events=(d.events||[]).slice(-50);
    // Update progress from events
    for(const[id,ag]of Object.entries(AGENTS)){
      const cnt=(d.events||[]).filter(e=>e.detail&&e.detail.includes(ag.name)).length;
      progress[id]=Math.min(cnt,ag.goal);
    }
    document.getElementById('roundLabel').textContent='R'+S.r+' [API]';
  }catch(e){
    useApi=false;
    document.getElementById('roundLabel').textContent='R'+S.r+' [local]';
    // fallback: keep local sim running
  }
}

function pollOrSim(){
  fetchState();
  if(!useApi) sim();
}

layout();
for(let i=0;i<4;i++)sim();
fetchState();
function frame(){layout();draw();updateHUD();requestAnimationFrame(frame);}
frame();
setInterval(pollOrSim,2000);
window.addEventListener('resize',layout);
</script>
</body></html>
