<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent 仿真运行平台</title>
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<div class="app">
<div class="canvas-panel" id="canvas-panel">
<iframe src="/tactical-map" id="campus-iframe" style="width:100%;height:100%;border:none;display:block;"></iframe>
<div class="tooltip" id="tooltip"></div>
</div>
<div class="side-panel">
<div class="section-title">
  <select id="scene-selector" onchange="onSceneSelect()" style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-size:0.7rem;width:150px">
    <option value="">选择场景脚本</option>
  </select>
  <button class="btn green" onclick="runSelectedScene()" style="margin-left:6px;font-size:0.7rem;padding:3px 10px">运行</button>
  <span class="toggle" onclick="togglePanel('script-editor')" style="margin-left:auto">_</span>
</div>
<div class="script-editor" id="script-editor" style="display:none"></div>
<div class="section-title">仿真日志 <span class="toggle" onclick="togglePanel('log-viewer')">_</span></div>
<div class="log-viewer" id="log-viewer">
<div class="log-controls">
<select id="log-filter" onchange="renderLogs()">
<option value="">全部级别</option><option value="L1">L1 系统</option><option value="L2">L2 Agent</option><option value="L3">L3 Tool</option><option value="L4">L4 Prompt</option><option value="L5">L5 Packet</option>
</select>
<label class="chk"><input type="checkbox" id="log-autoscroll" checked>自动</label>
<button class="btn ghost" onclick="clearLogs()">清空</button>
<span style="font-size:0.65rem;color:var(--gray);margin-left:auto" id="log-count">0</span>
</div>
<div class="log-entries" id="log-entries"><div class="log-entry"><span class="ts">--</span> <span class="lv lv-L1">就绪</span> <span class="ev">等待仿真启动...</span></div></div>
</div>
</div>
</div>
<script src="/static/dashboard.js"></script>
</body>
</html>
