name: Migrate legacy scenes to v2

on:
  push:
    branches:
      - agent/migrate-legacy-scenes-v2

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Migrate repository scenes
        run: |
          python scripts/migrate_scenes_v2.py \
            --root scenes \
            --delete-legacy \
            --report docs/records/实施记录-旧剧本迁移到v2.md

      - name: Validate all v2 scenes
        run: |
          python - <<'PY'
          from pathlib import Path

          from agent_network.scene_management.validator_v2 import SceneValidatorV2
          from scripts.migrate_scenes_v2 import parse_env, read_json, v2_scene_dirs

          validator = SceneValidatorV2()
          failures = []
          for scene in v2_scene_dirs(Path('scenes')):
              validated = validator.validate(
                  scene.relative_to(Path('scenes')).as_posix(),
                  scene,
                  read_json(scene / 'Agents.json'),
                  parse_env(scene / 'env.py'),
                  read_json(scene / 'topology.json'),
              )
              if not validated.validation.valid:
                  failures.append(
                      (scene.as_posix(), [issue.to_dict() for issue in validated.validation.issues])
                  )
          if failures:
              raise SystemExit(repr(failures))
          print(f'validated {len(v2_scene_dirs(Path("scenes")))} v2 scenes')
          PY

      - name: Run migration tests
        run: |
          pytest -q tests/test_scene_v2_migration.py tests/test_scene_env_contract.py
          python -m compileall -q scripts agent_network scenes

      - name: Commit generated migration
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No generated changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scenes docs/records
          git commit -m '迁移存量剧本到v2目录合同'
          git push origin HEAD:${GITHUB_REF_NAME}
