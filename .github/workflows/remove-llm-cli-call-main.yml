name: Remove llm_cli_call from main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-llm-cli-call-main.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove unused CLI event and logger
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_exact(text: str, old: str, new: str, *, count: int = 1) -> str:
              actual = text.count(old)
              if actual != count:
                  raise RuntimeError(f"expected {count} occurrence(s), found {actual}: {old[:80]!r}")
              return text.replace(old, new)

          path = "agent_network/log_manager.py"
          text = read(path)
          text = replace_exact(text, '    "llm_cli_call",\n', '', count=1)
          text = replace_exact(
              text,
              '    "agent_action",\n}\nNETWORK_EVENTS = {',
              '    "agent_action",\n    "llm_cli_call",\n}\nNETWORK_EVENTS = {',
          )
          cli_layout = '''    "llm_cli_call": (
              ("action",),
              (
                  "target",
                  "task",
                  "action",
                  "content",
                  "payload",
                  "result",
                  "metrics",
                  "links",
              ),
          ),
          '''
          text = replace_exact(text, cli_layout, '')
          text = replace_exact(
              text,
              'open_target=name in {"llm_api_call", "llm_cli_call"}',
              'open_target=name == "llm_api_call"',
          )
          text = replace_exact(text, '"schema_version": "application.v6"', '"schema_version": "application.v7"')
          old_error = '''        raise ValueError(
              f"application event '{event}' has been removed; "
              "use 'reasoning' or 'acting'"
          )'''
          text = replace_exact(
              text,
              old_error,
              '''        raise ValueError(
              f"application event '{event}' has been removed"
          )''',
              count=2,
          )
          write(path, text)

          path = "agent_network/llm_metrics.py"
          text = read(path)
          text = text.replace(
              "  from agent_network.llm_metrics import log_llm_call, log_llm_cli\n",
              "  from agent_network.llm_metrics import log_llm_call\n",
          )
          text = text.replace(
              "\n  # Claude CLI 调用\n  log_llm_cli(exit_code=0, latency_ms=2345.6, component=\"ag-c1\")\n",
              "\n",
          )
          text = text.replace("import json\n", "")
          start = text.find("\ndef log_llm_cli(*,")
          end = text.find("\n# ── 上下文管理器：包装 LLM 调用并自动记录 ──", start)
          if start < 0 or end < 0:
              raise RuntimeError("log_llm_cli function block not found")
          text = text[:start] + "\n" + text[end:]
          if "log_llm_cli" in text or "llm_cli_call" in text:
              raise RuntimeError("CLI logger references remain in llm_metrics.py")
          write(path, text)

          path = "agent_network/state.py"
          text = read(path)
          text = replace_exact(
              text,
              'record.get("event") not in {"llm_api_call", "llm_cli_call"}',
              'record.get("event") != "llm_api_call"',
          )
          write(path, text)

          path = "agent_network/api/logs.py"
          text = read(path)
          text = replace_exact(
              text,
              'record.get("event") in {"llm_api_call", "llm_cli_call"}',
              'record.get("event") == "llm_api_call"',
          )
          write(path, text)

          path = "web/public/dashboard.js"
          text = read(path)
          replacements = {
              '"llm_api_call", "llm_cli_call"': '"llm_api_call"',
              "'llm_api_call', 'llm_cli_call'": "'llm_api_call'",
          }
          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
                  changed = True
          if not changed:
              raise RuntimeError("dashboard llm_cli_call classification not found")
          write(path, text)

          Path("tests/test_llm_cli_removed.py").write_text(
              '''import pytest

from agent_network import llm_metrics
from agent_network.log_manager import (
    APPLICATION_EVENTS,
    LogManager,
    application_log_schema,
)


@pytest.mark.not_llm
def test_llm_cli_event_and_logger_are_removed(tmp_path):
    assert "llm_cli_call" not in APPLICATION_EVENTS
    assert "llm_cli_call" not in application_log_schema["event_schemas"]
    assert not hasattr(llm_metrics, "log_llm_cli")

    manager = LogManager(log_dir=str(tmp_path))
    manager.reset()
    manager._log_dir = str(tmp_path)
    with pytest.raises(ValueError, match="has been removed"):
        manager.emit_application_event(
            event="llm_cli_call",
            actor={"agent_id": "a1"},
            action={"name": "CLI"},
        )
    manager.reset()
''',
              encoding="utf-8",
          )

          remaining = []
          for root_name in ("agent_network", "web"):
              for file in Path(root_name).rglob("*"):
                  if file.is_file() and file.suffix in {".py", ".js", ".html"}:
                      if "llm_cli_call" in file.read_text(encoding="utf-8", errors="ignore"):
                          remaining.append(str(file))
          if remaining:
              raise RuntimeError(f"production llm_cli_call references remain: {remaining}")
          PY

      - name: Validate changes
        shell: bash
        run: |
          python -m py_compile \
            agent_network/log_manager.py \
            agent_network/llm_metrics.py \
            agent_network/state.py \
            agent_network/api/logs.py \
            tests/test_llm_cli_removed.py
          if python -c 'import pytest' >/dev/null 2>&1; then
            python -m pytest -q \
              tests/test_application_log_schema.py \
              tests/test_llm_cli_removed.py
          fi

      - name: Commit refactor
        shell: bash
        run: |
          rm .github/workflows/remove-llm-cli-call-main.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove llm_cli_call event and logger"
          git push origin HEAD:main
