name: Remove agent layout fields

on:
  push:
    branches:
      - refactor/remove-agent-layout-fields
    paths:
      - scripts/remove_agent_fields.py
      - .github/workflows/remove-agent-layout-fields.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/remove-agent-layout-fields
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements.txt pytest
      - run: python scripts/remove_agent_fields.py
      - run: python -m py_compile agent_network/agent_model.py
      - run: pytest -q tests/test_agent_model_control_plane_only.py
      - run: rm scripts/remove_agent_fields.py .github/workflows/remove-agent-layout-fields.yml
      - uses: EndBug/add-and-commit@v9
        with:
          message: 'refactor: remove agent layout and timestamp fields'
          push: true
