name: Apply topology link migration

on:
  push:
    branches:
      - refactor/topology-link-model
    paths:
      - scripts/migrate_topology_link_model.py
      - scripts/prepare_topology_link_migration.py
      - .github/workflows/migrate-topology-link-model.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/topology-link-model
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Prepare legacy topology data
        run: python scripts/prepare_topology_link_migration.py

      - name: Apply strict TopologyLink migration
        run: python scripts/migrate_topology_link_model.py

      - name: Compile changed Python files
        run: |
          python -m py_compile \
            agent_network/api/simulations.py \
            agent_network/network_emulation.py \
            scenes/scenario.py \
            tests/test_network_emulation.py \
            tests/test_scene_building_boundary.py

      - name: Run topology boundary tests
        id: topology_tests
        continue-on-error: true
        run: |
          pytest -q \
            tests/test_network_emulation.py \
            tests/test_scene_building_boundary.py \
            > pytest.log 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: topology-test-log
          path: pytest.log

      - name: Stop on test failure
        if: steps.topology_tests.outcome != 'success'
        run: exit 1

      - name: Remove one-shot migration files
        run: rm scripts/migrate_topology_link_model.py scripts/prepare_topology_link_migration.py .github/workflows/migrate-topology-link-model.yml

      - uses: EndBug/add-and-commit@v9
        with:
          message: 'refactor: adopt strict bidirectional topology link model'
          push: true
