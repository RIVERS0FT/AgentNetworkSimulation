name: Strict agent model cleanup

on:
  push:
    branches:
      - refactor/remove-agent-extra-meta
    paths:
      - scripts/strict_agent_model_cleanup.py
      - .github/workflows/strict-agent-model-cleanup.yml
  pull_request:
    branches:
      - main

jobs:
  cleanup-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/remove-agent-extra-meta

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Apply strict agent model cleanup
        run: python scripts/strict_agent_model_cleanup.py

      - name: Compile changed Python files
        run: |
          python -m py_compile \
            agent_network/scene_def.py \
            agent_network/agent_model.py \
            agent_network/api/simulations.py \
            agent_network/container_runtime.py \
            services/agent_server.py \
            tests/test_scene_building_boundary.py \
            tests/test_container_runtime_boundary.py \
            tests/test_agent_model_control_plane_only.py \
            tests/test_adapter_context_boundary.py

      - name: Run strict agent model tests
        run: |
          pytest -q \
            tests/test_scene_building_boundary.py \
            tests/test_container_runtime_boundary.py \
            tests/test_agent_model_control_plane_only.py \
            tests/test_adapter_context_boundary.py \
            > strict-tests.log 2>&1

      - name: Verify compatibility tokens are gone
        run: python scripts/strict_agent_model_cleanup.py --validate

      - name: Collect cleanup output
        run: |
          mkdir -p strict-cleanup-output
          cp strict-tests.log strict-cleanup-output/strict-tests.log || true
          cp agent_network/api/simulations.py strict-cleanup-output/simulations.py
          cp tests/test_scene_building_boundary.py strict-cleanup-output/test_scene_building_boundary.py
          cp tests/test_container_runtime_boundary.py strict-cleanup-output/test_container_runtime_boundary.py
          cp tests/test_agent_model_control_plane_only.py strict-cleanup-output/test_agent_model_control_plane_only.py
          cp scenes/README.md strict-cleanup-output/scenes_README.md || true

      - uses: actions/upload-artifact@v4
        with:
          name: strict-agent-model-cleanup-output
          path: strict-cleanup-output
