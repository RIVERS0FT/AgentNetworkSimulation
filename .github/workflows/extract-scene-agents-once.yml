name: Extract scene agents once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate and validate agents.json
        run: |
          python scripts/extract_scene_agents.py
          python scripts/extract_scene_agents.py --check
          python - <<'PY'
          import json
          from pathlib import Path

          files = sorted(Path('scenes').rglob('agents.json'))
          if not files:
              raise SystemExit('no agents.json files generated')
          for path in files:
              data = json.loads(path.read_text(encoding='utf-8'))
              agents = data.get('agents')
              if not isinstance(agents, list):
                  raise SystemExit(f'{path}: agents must be an array')
              for agent in agents:
                  expected = {
                      'agent_id', 'role', 'name', 'background', 'core_goal',
                      'backend', 'skill_refs', 'allowed_tools', 'tasks'
                  }
                  if set(agent) != expected:
                      raise SystemExit(f'{path}: unexpected AgentDef fields: {sorted(set(agent) ^ expected)}')
          print(f'validated {len(files)} agents.json files')
          PY

      - name: Commit generated files
        run: |
          rm .github/workflows/extract-scene-agents-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Extract scene agents into agents.json"
          git push origin HEAD:main
