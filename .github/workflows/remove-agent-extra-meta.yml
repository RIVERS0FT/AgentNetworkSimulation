name: Remove Agent extra_meta

on:
  push:
    branches:
      - refactor/remove-agent-extra-meta
    paths:
      - scripts/apply_remove_agent_extra_meta.py
      - scripts/prepare_remove_agent_extra_meta.py
      - .github/workflows/remove-agent-extra-meta.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/remove-agent-extra-meta
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Remove legacy Agent status fields
        run: python scripts/prepare_remove_agent_extra_meta.py

      - name: Apply strict Agent model migration
        id: migrate
        continue-on-error: true
        run: python scripts/apply_remove_agent_extra_meta.py > migration.log 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-model-migration-log
          path: migration.log

      - name: Stop on migration failure
        if: steps.migrate.outcome != 'success'
        run: exit 1

      - name: Compile changed Python files
        run: |
          python -m py_compile \
            agent_network/scene_def.py \
            agent_network/agent_model.py \
            agent_network/api/simulations.py \
            agent_network/container_runtime.py \
            services/agent_server.py \
            tests/test_scene_building_boundary.py \
            tests/test_container_runtime_boundary.py \
            tests/test_agent_model_control_plane_only.py

      - name: Run focused boundary tests
        run: |
          pytest -q \
            tests/test_scene_building_boundary.py \
            tests/test_container_runtime_boundary.py \
            tests/test_agent_model_control_plane_only.py \
            tests/test_agent_server_boundary.py \
            tests/test_adapter_context_boundary.py \
            tests/test_experiment_manifest.py

      - name: Remove one-shot migration files
        run: rm scripts/apply_remove_agent_extra_meta.py scripts/prepare_remove_agent_extra_meta.py .github/workflows/remove-agent-extra-meta.yml

      - uses: EndBug/add-and-commit@v9
        with:
          message: 'refactor: remove Agent extra_meta compatibility contract'
          push: true
